<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Caramelo Live — Over 3.5 / 5+</title>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--panel2:#1c2330;--line:#2d3543;--txt:#e6edf3;--muted:#8b98a8;--green:#2ea043;--greenb:#3fb950;--red:#da3633;--amber:#d29922;--blue:#388bfd}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;padding:14px;max-width:1100px;margin:0 auto}
  h1{font-size:19px;color:var(--greenb)}
  .sub{color:var(--muted);font-size:12px;margin-bottom:14px}
  .bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;padding:10px;background:var(--panel);border:1px solid var(--line);border-radius:10px}
  select{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:6px;padding:6px 10px;font-size:13px}
  .live{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:13px}
  .card h3{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:7px}
  .big{font-size:24px;font-weight:700}
  .note{font-size:11px;color:var(--muted);margin-top:3px}
  .pos{color:var(--greenb)}.neg{color:var(--red)}.neu{color:var(--amber)}
  .sec{font-size:14px;font-weight:700;margin:16px 0 8px}
  table{width:100%;border-collapse:collapse;font-size:13px;background:var(--panel);border-radius:10px;overflow:hidden}
  th{background:var(--panel2);text-align:left;padding:8px 10px;font-size:10px;text-transform:uppercase;color:var(--muted)}
  td{padding:8px 10px;border-bottom:1px solid var(--line)}
  tr:last-child td{border-bottom:none}
  tr.ok{background:rgba(46,160,67,.10)}
  .tag{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
  .tag.ok{background:rgba(46,160,67,.18);color:var(--greenb)}
  .tag.no{background:rgba(218,54,51,.18);color:#f85149}
  .therm{display:flex;gap:8px;align-items:flex-end;height:64px;margin:20px 0}
  .therm .b{flex:1;border-radius:4px 4px 0 0;position:relative;min-height:4px}
  .therm .b span{position:absolute;top:-15px;left:0;right:0;text-align:center;font-size:10px;color:var(--muted)}
  .therm .b small{position:absolute;bottom:-15px;left:0;right:0;text-align:center;font-size:10px;color:var(--muted)}
  .hint{font-size:11px;color:var(--muted);margin-top:6px}
  .err{color:var(--amber);font-size:12px}
</style>
</head>
<body>
<h1>Caramelo Live</h1>
<div class="sub">Over 3.5 / 5+ ao vivo — atualiza sozinho direto da API, sem travar.</div>

<div class="bar">
  <select id="liga"><option value="euro">Euro</option><option value="copa">Copa</option><option value="super">Super</option><option value="premier">Premier</option></select>
  <select id="mkt"><option value="o35">Over 3.5</option><option value="ge5">5+ gols</option><option value="o25">Over 2.5</option><option value="ambas">Ambas Marcam</option></select>
  <label style="font-size:12px;color:var(--muted)">Qtd. Jogos</label>
  <select id="qtd"><option>20</option><option>40</option><option>60</option><option>80</option><option>100</option><option>120</option><option>240</option></select>
  <span class="live"><span class="dot"></span><span id="liveinfo">conectando...</span></span>
</div>

<div id="conteudo"></div>

<script>
const $=s=>document.querySelector(s);
const ligaSel=$('#liga'), mktSel=$('#mkt'), qtdSel=$('#qtd');
const nomeMkt={o35:'Over 3.5',ge5:'5+ gols',o25:'Over 2.5',ambas:'Ambas Marcam'};

async function tick(){
  const liga=ligaSel.value, mkt=mktSel.value, qtd=qtdSel.value;
  try{
    const r=await fetch('/api/liga/'+liga+'?mkt='+mkt+'&qtd='+qtd,{cache:'no-store'});
    const d=await r.json();
    if(d.erro){ $('#liveinfo').textContent='aguardando dados...'; return; }
    render(d);
    const upd=d.lastUpdated?new Date(d.lastUpdated):null;
    $('#liveinfo').textContent='ao vivo • atualizado '+(upd?upd.toLocaleTimeString('pt-BR'):'agora');
  }catch(e){ $('#liveinfo').textContent='erro de conexao'; }
}

function render(d){
  const a=d.analise, mkt=d.mercado;
  const aquece=a.aquecingo||a.aquecendo;
  const sig=a.sinal||{};
  const term=a.termometro;
  const maxv=Math.max(...term.map(t=>t.v||0),1);
  const termHtml=term.map((t,i)=>{
    const h=t.v==null?4:Math.max(4,Math.round(t.v/maxv*100));
    const col=t.v==null?'var(--panel2)':(i===0&&a.aquecendo?'var(--greenb)':'var(--blue)');
    return `<div class="b" style="height:${h}%;background:${col}"><span>${t.v==null?'—':t.v+'%'}</span><small>${t.n}</small></div>`;
  }).join('');

  // GRAFICO DA LINHA (SVG) com numeros nos pontos + histograma MACD
  const serie=a.serie||[];
  const chart=lineChart(serie, a.macdHist||[]);

  // PAINEL DE ALERTAS (no topo, em destaque)
  const alertaHtml=(a.alertas||[]).map(al=>{
    const cor=al.cls==='ok'?'var(--greenb)':al.cls==='bad'?'var(--red)':'var(--amber)';
    return `<div style="padding:8px 12px;border-radius:8px;background:rgba(255,255,255,.03);border-left:3px solid ${cor};margin-bottom:6px;font-size:13px"><b style="color:${cor}">${al.tipo}</b> — ${al.txt}</div>`;
  }).join('');

  // cor do sinal
  const sinalCor = /COMPRA|SUBINDO/.test(sig.sinal)?'var(--greenb)' : /TOPO|RISCO|RECUO/.test(sig.sinal)?'var(--red)' : /PROTEGER|FUNDO|MINIMA/.test(sig.sinal)?'var(--amber)':'var(--muted)';

  // confluencia 3h/6h/12h
  const conf=a.confluencia||{janelas:[]};
  const confHtml=(conf.janelas||[]).map(j=>{
    const cor=j.dir==='Subindo'?'var(--greenb)':j.dir==='Descendo'?'var(--red)':'var(--muted)';
    return `<div class="card" style="flex:1;min-width:120px;text-align:center"><h3>${j.nome}</h3><div style="font-size:16px;font-weight:700;color:${cor}">${j.dir}</div><div class="note">${j.pct!=null?j.pct+'% • incl '+j.slope:'sem dados'}</div></div>`;
  }).join('');

  // PROXIMOS JOGOS (cards detalhados - cerebro real da extensao)
  const statusCor=s=>/ENTRADA/.test(s)?'var(--greenb)':/OBSERVAR/.test(s)?'#7fd17f':/PASSAR|EVITAR|TOPO/.test(s)?'var(--red)':'var(--amber)';
  const scoreCor=sc=>sc>=70?'var(--greenb)':sc>=55?'var(--amber)':'var(--red)';
  const prox=(d.proximos||[]).map(p=>{
    if(p.erro)return `<div class="card" style="margin-bottom:10px"><b>${p.nome||'?'}</b> <span class="note">— ${p.erro}</span></div>`;
    return `<div class="card" style="margin-bottom:10px;border-left:4px solid ${scoreCor(p.score||0)}">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <b style="font-size:15px">${p.nome} <span style="color:var(--muted);font-size:11px;font-weight:400">[${d.liga.toUpperCase()}]</span></b>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="text-align:center"><div style="font-size:26px;font-weight:800;color:${scoreCor(p.score||0)};line-height:1">${p.score??'—'}</div><div class="note" style="font-size:9px">SCORE</div></div>
          <div style="text-align:right"><div>${p.odd?'@'+(typeof p.odd==='number'?p.odd.toFixed(2):p.odd):'—'}</div><div style="color:${statusCor(p.status)};font-weight:700;font-size:13px">${p.status}</div></div>
        </div>
      </div>
      <div style="margin-top:6px;font-size:12px;color:var(--muted)">Motivo: <b style="color:${/FORTE/.test(p.motivo)?'var(--greenb)':/CONTRA|FRACA|FRIA|SEM/.test(p.motivo)?'var(--red)':'var(--txt)'}">${p.motivo}</b></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-top:10px;font-size:12px">
        <div><span class="note">Prob calibrada</span><br><b>${p.prob!=null?p.prob+'%':'—'}</b></div>
        <div><span class="note">Odd justa</span><br><b>${p.justa??'—'}</b></div>
        <div><span class="note">EV real</span><br><b class="${p.ev>0?'pos':'neg'}">${p.ev!=null?(p.ev>0?'+':'')+p.ev+'%':'—'}</b></div>
        <div><span class="note">EV gale</span><br><b>${p.evGale!=null?(p.evGale>0?'+':'')+p.evGale+'%':'—'}</b></div>
        <div><span class="note">Edge</span><br><b>${p.edge!=null?(p.edge>0?'+':'')+p.edge+'%':'—'}</b></div>
        <div><span class="note">Base dessa odd</span><br><b>${p.oddBase}${p.coldOdd?' ❄️FRIA':''}</b></div>
        <div><span class="note">Base dos times</span><br><b>${p.teamBase}</b></div>
        <div style="grid-column:1/-1"><span class="note">Ciclo</span><br><b>${p.ciclo}</b></div>
      </div>
    </div>`;
  }).join('');

  // status da liga
  const ls=a.ligaStatus||{};
  const lsCor=ls.cls==='ok'?'var(--greenb)':ls.cls==='bad'?'var(--red)':'var(--amber)';

  const rankHtml=a.ranking.map(r=>{
    const good=r.ev>0;
    return `<tr class="${good?'ok':''}"><td>@${r.odd.toFixed(2)}</td><td>${r.hit}/${r.tot}</td><td>${r.p}%</td><td>${r.justa??'—'}</td><td class="${good?'pos':'neg'}">${r.ev>0?'+':''}${r.ev}%</td><td><span class="tag ${good?'ok':'no'}">${good?'vale':'cara'}</span></td></tr>`;
  }).join('');

  const sigHuman=s=>s.split('').map(c=>c==='1'?'✓':'·').join(' ');
  const sigAtual=a.atual;
  const sigHtml=a.signatures.map(s=>`<tr><td>${sigHuman(s.sig)}</td><td>${s.n}</td><td>${s.paid}</td><td class="${s.p>=a.base?'pos':''}">${s.p}%</td></tr>`).join('');
  const ultimos=d.ultimos.map(u=>`${u.placar} (${u.total})`).join(' &nbsp;·&nbsp; ');

  $('#conteudo').innerHTML=`
    ${alertaHtml?`<div class="sec">⚠️ Alertas</div><div class="card">${alertaHtml}</div>`:''}

    <div class="sec">Gráfico — ${nomeMkt[mkt]} • Qtd. Jogos: ${a.qtdJogos||d.qtd||20}</div>
    <div class="card">${chart}
      <div style="display:flex;gap:18px;flex-wrap:wrap;margin-top:12px;font-size:13px">
        <div><span class="note">Sinal</span><br><b style="color:${sinalCor};font-size:16px">${sig.sinal||'—'}</b></div>
        <div><span class="note">Zona</span><br><b>${sig.zona||'—'} ${sig.zonaPct!=null?sig.zonaPct+'%':''}</b></div>
        <div><span class="note">Direção</span><br><b>${sig.direcao||'—'}</b></div>
        <div><span class="note">MACD</span><br><b class="${sig.macd>0?'pos':'neg'}">${sig.macd??'—'}</b></div>
        <div><span class="note">MM1 / MM2</span><br><b>${sig.mm1??'—'} / ${sig.mm2??'—'}</b></div>
        <div><span class="note">Pagamento</span><br><b>${sig.pagamento||'—'}</b></div>
      </div>
    </div>

    <div class="sec">Confluência por tempo — 3h / 6h / 12h</div>
    <div class="card">
      <div style="display:flex;gap:12px;flex-wrap:wrap">${confHtml}</div>
      <div class="hint" style="margin-top:10px">Quando as três janelas apontam pro mesmo lado, o sinal é forte. <b style="color:${a.confluencia&&/forte/.test(a.confluencia.confluencia)?'var(--greenb)':'var(--muted)'}">${a.confluencia?a.confluencia.confluencia:'—'}</b></div>
    </div>

    <div class="sec">Próximos jogos — ${nomeMkt[mkt]} <span style="color:${lsCor};font-size:13px">• Liga: ${ls.label||'—'}</span></div>
    ${prox||'<div class="card">aguardando próximos jogos...</div>'}

    <div class="grid" style="margin-top:14px">
      <div class="card"><h3>Jogos no histórico</h3><div class="big">${a.total}</div><div class="note">${d.liga.toUpperCase()}</div></div>
      <div class="card"><h3>% que paga ${nomeMkt[mkt]}</h3><div class="big">${a.base}%</div><div class="note">taxa real</div></div>
      <div class="card"><h3>Odd justa</h3><div class="big">${a.justa??'—'}</div><div class="note">só vale acima</div></div>
      <div class="card"><h3>Formação</h3><div class="big ${a.aquecendo?'pos':'neu'}">${a.aquecendo?'Esquentando':'Estável'}</div><div class="note">120 vs longas</div></div>
    </div>

    <div class="sec">Termômetro 120 / 240 / 480 / 960</div>
    <div class="card"><div class="therm">${termHtml}</div>
      <div class="hint">120 verde e acima das longas = ${nomeMkt[mkt]} esquentando.</div></div>

    <div class="sec">Últimos resultados</div>
    <div class="card"><div style="font-size:13px">${ultimos}</div></div>

    <div class="sec">Ranking de odds — onde a base paga mais que a odd embute</div>
    <table><thead><tr><th>Odd</th><th>Acertos</th><th>% base</th><th>Odd justa</th><th>EV</th><th>Veredito</th></tr></thead><tbody>${rankHtml}</tbody></table>

    <div class="sec">Assinatura atual (últimos 5): ${sigHuman(sigAtual.sig)}</div>
    <div class="card"><div style="font-size:13px">Apareceu <b>${sigAtual.n}</b> vezes e pagou depois <b class="${sigAtual.p>=a.base?'pos':'neg'}">${sigAtual.p}%</b> ${sigAtual.p>=a.base?'(acima da média)':'(abaixo)'}.</div></div>

    <div class="sec">Top assinaturas que mais pagam depois</div>
    <table><thead><tr><th>Padrão (últimos 5)</th><th>Vezes</th><th>Pagou</th><th>%</th></tr></thead><tbody>${sigHtml}</tbody></table>
  `;
}

function lineChart(serie, macdHist){
  if(!serie.length)return '<div class="note">sem dados para o gráfico</div>';
  const W=680,H=200,pad=28, hH=70, gap=14; // H=linha, hH=histograma
  const totalH=H+gap+hH;
  const min=Math.min(...serie),max=Math.max(...serie);
  const rng=Math.max(1,max-min);
  const x=i=>pad+i*((W-2*pad)/(serie.length-1||1));
  const y=v=>pad+(1-(v-min)/rng)*(H-2*pad);
  // linha com cor por direcao geral
  const last=serie[serie.length-1], first=serie[0];
  const cor=last>first?'#3fb950':last<first?'#da3633':'#8b98a8';
  const pts=serie.map((v,i)=>x(i)+','+y(v)).join(' ');
  // bolinhas + numeros nos pontos (so quando o valor muda, pra nao poluir)
  let dots='', labels='';
  serie.forEach((v,i)=>{
    dots+=`<circle cx="${x(i)}" cy="${y(v)}" r="3" fill="${i===serie.length-1?cor:'#8b98a8'}"/>`;
    if(i===0||v!==serie[i-1]){ // numero so quando muda
      labels+=`<text x="${x(i)}" y="${y(v)-8}" fill="#e6edf3" font-size="11" font-weight="600" text-anchor="middle">${v}</text>`;
    }
  });
  // histograma MACD embaixo
  let macdSvg='';
  if(macdHist&&macdHist.length){
    const hm=Math.max(...macdHist.map(Math.abs),0.5);
    const baseY=H+gap+hH/2;
    const hx=i=>pad+i*((W-2*pad)/(macdHist.length-1||1));
    macdSvg=`<line x1="${pad}" y1="${baseY}" x2="${W-pad}" y2="${baseY}" stroke="#2d3543"/>`;
    macdHist.forEach((m,i)=>{
      const bh=Math.abs(m)/hm*(hH/2-2);
      const col=m>=0?'#2ea043':'#da3633';
      macdSvg+=`<rect x="${hx(i)-2}" y="${m>=0?baseY-bh:baseY}" width="4" height="${bh}" fill="${col}"/>`;
    });
    macdSvg+=`<text x="${pad}" y="${H+gap+10}" fill="#8b98a8" font-size="10">Histograma MACD (MM1 vs MM2)</text>`;
  }
  return `<svg viewBox="0 0 ${W} ${totalH}" style="width:100%;height:auto">
    <line x1="${pad}" y1="${pad}" x2="${W-pad}" y2="${pad}" stroke="#2d3543" stroke-dasharray="3 3"/>
    <line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}" stroke="#2d3543" stroke-dasharray="3 3"/>
    <polyline points="${pts}" fill="none" stroke="${cor}" stroke-width="2"/>
    ${dots}${labels}
    <text x="${W-pad}" y="${pad-8}" fill="#8b98a8" font-size="11" text-anchor="end">Topo ${max}%</text>
    <text x="${W-pad}" y="${H-pad+16}" fill="#8b98a8" font-size="11" text-anchor="end">Fundo ${min}%</text>
    ${macdSvg}
  </svg>`;
}

ligaSel.onchange=tick;
mktSel.onchange=tick;
qtdSel.onchange=tick;
tick();
setInterval(tick,10000);
</script>
</body>
</html>
