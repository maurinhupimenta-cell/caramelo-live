<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Caramelo Live — Over 3.5 / 5+</title>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--panel2:#1c2330;--line:#2d3543;--txt:#e6edf3;--muted:#8b98a8;--green:#2ea043;--greenb:#3fb950;--red:#da3633;--amber:#d29922;--blue:#388bfd}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;padding:14px;max-width:1100px;margin:0 auto}
  h1{font-size:19px;color:var(--greenb)}
  .sub{color:var(--muted);font-size:12px;margin-bottom:14px}
  .bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;padding:10px;background:var(--panel);border:1px solid var(--line);border-radius:10px}
  select{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:6px;padding:6px 10px;font-size:13px}
  .live{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:13px}
  .card h3{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:7px}
  .big{font-size:24px;font-weight:700}
  .note{font-size:11px;color:var(--muted);margin-top:3px}
  .pos{color:var(--greenb)}.neg{color:var(--red)}.neu{color:var(--amber)}
  .sec{font-size:14px;font-weight:700;margin:16px 0 8px}
  table{width:100%;border-collapse:collapse;font-size:13px;background:var(--panel);border-radius:10px;overflow:hidden}
  th{background:var(--panel2);text-align:left;padding:8px 10px;font-size:10px;text-transform:uppercase;color:var(--muted)}
  td{padding:8px 10px;border-bottom:1px solid var(--line)}
  tr:last-child td{border-bottom:none}
  tr.ok{background:rgba(46,160,67,.10)}
  .tag{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
  .tag.ok{background:rgba(46,160,67,.18);color:var(--greenb)}
  .tag.no{background:rgba(218,54,51,.18);color:#f85149}
  .therm{display:flex;gap:8px;align-items:flex-end;height:64px;margin:20px 0}
  .therm .b{flex:1;border-radius:4px 4px 0 0;position:relative;min-height:4px}
  .therm .b span{position:absolute;top:-15px;left:0;right:0;text-align:center;font-size:10px;color:var(--muted)}
  .therm .b small{position:absolute;bottom:-15px;left:0;right:0;text-align:center;font-size:10px;color:var(--muted)}
  .hint{font-size:11px;color:var(--muted);margin-top:6px}
  .err{color:var(--amber);font-size:12px}
</style>
</head>
<body>
<h1>Caramelo Live</h1>
<div class="sub">Over 3.5 / 5+ ao vivo — atualiza sozinho direto da API, sem travar.</div>

<div class="bar">
  <select id="liga"><option value="euro">Euro</option><option value="copa">Copa</option><option value="super">Super</option><option value="premier">Premier</option></select>
  <select id="mkt"><option value="o35">Over 3.5</option><option value="ge5">5+ gols</option><option value="o25">Over 2.5</option><option value="ambas">Ambas Marcam</option><option value="totft">Total Gols (FT)</option></select>
  <label style="font-size:12px;color:var(--muted)">Qtd. Jogos</label>
  <select id="qtd"><option>20</option><option>40</option><option>60</option><option>80</option><option>100</option><option>120</option><option>240</option></select>
  <button id="somBtn" style="font-size:12px;padding:6px 12px;border-radius:8px;border:1px solid var(--line);background:#1c2333;color:#e8edf4;cursor:pointer">🔔 Ativar som</button>
  <button id="notifBtn" style="font-size:12px;padding:6px 12px;border-radius:8px;border:1px solid var(--line);background:#1c2333;color:#e8edf4;cursor:pointer">�🖥️ Notificações</button>
  <span class="live"><span class="dot"></span><span id="liveinfo">conectando...</span></span>
</div>

<div id="radar"></div>
<div id="conteudo"></div>

<script>
const $=s=>document.querySelector(s);
const ligaSel=$('#liga'), mktSel=$('#mkt'), qtdSel=$('#qtd');
const nomeMkt={o35:'Over 3.5',ge5:'5+ gols',o25:'Over 2.5',ambas:'Ambas Marcam',totft:'Total Gols (FT)'};

let _lastHash = "";
async function tick(){
  const liga=ligaSel.value, mkt=mktSel.value, qtd=qtdSel.value;
  try{
    const r=await fetch('/api/liga/'+liga+'?mkt='+mkt+'&qtd='+qtd,{cache:'no-store'});
    const d=await r.json();
    if(d.erro){ $('#liveinfo').textContent='aguardando dados...'; return; }
    // so re-renderiza se os dados mudaram (evita travar reconstruindo tudo a cada 10s)
    const hash=JSON.stringify({u:d.lastUpdated,n:(d.proximos||[]).length,s:d.analise&&d.analise.serie,cr:d.curvaReal,m:mkt,l:liga,q:qtd});
    if(hash!==_lastHash){ _lastHash=hash; render(d); }
    const upd=d.lastUpdated?new Date(d.lastUpdated):null;
    $('#liveinfo').textContent='ao vivo • atualizado '+(upd?upd.toLocaleTimeString('pt-BR'):'agora');
  }catch(e){ $('#liveinfo').textContent='erro de conexao'; }
}

// toca uma sequencia de bips. notas = [[freq, inicio_s, duracao_s], ...]
function bipSeq(notas){
  try{
    const Ctx=window.AudioContext||window.webkitAudioContext; if(!Ctx)return;
    window.__actx=window.__actx||new Ctx();
    const ctx=window.__actx;
    if(ctx.state==='suspended'){ ctx.resume(); }
    // se ainda nao foi destravado por um gesto do usuario, nao toca (politica do navegador)
    if(ctx.state!=='running'){ window.__somPendente=true; return; }
    notas.forEach(([freq,start,dur])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=freq;
      const t=ctx.currentTime+start;
      g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(0.35,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
      o.start(t);o.stop(t+dur+0.02);
    });
  }catch(e){}
}
// som de ancora (2 bips, +1 se FORTE)
function tocaAlertaAncora(forte){
  const seq=[[880,0,0.16],[1175,0.2,0.16]];
  if(forte)seq.push([1568,0.42,0.22]);
  bipSeq(seq);
}


// ===== RADAR GLOBAL (todas as ligas x mercados): painel + notificacao + som =====
const nomeLiga={euro:'Euro',copa:'Copa',super:'Super',premier:'Premier'};
const fitaTxt=f=>(f&&f.length)?' · últimos: '+f.map(v=>v?'🟢':'🔴').join(''):'';
function radarHtml(lista){
  if(!lista||!lista.length)return '';
  const chips=lista.map(a=>a.tipo==='minima'
    ?`<span style="display:inline-block;margin:3px 6px 3px 0;padding:5px 10px;border-radius:8px;border:1px solid #58a6ff;background:rgba(88,166,255,.1);font-size:12px;font-weight:700;color:#58a6ff">📉 ${nomeLiga[a.liga]||a.liga} · ${nomeMkt[a.mkt]||a.mkt} — mínima, pagando ${a.pagando!=null?a.pagando+'%':'—'}${a.base!=null?` <span style="opacity:.7">(normal ${a.base}%)</span>`:''}${fitaTxt(a.fita)}</span>`
    :`<span style="display:inline-block;margin:3px 6px 3px 0;padding:5px 10px;border-radius:8px;border:1px solid var(--greenb);background:rgba(46,160,67,.1);font-size:12px;font-weight:700;color:var(--greenb)">📈 ${nomeLiga[a.liga]||a.liga} · ${nomeMkt[a.mkt]||a.mkt} — subindo: ${a.deOnde!=null?a.deOnde+'% → ':''}${a.pagando!=null?a.pagando+'%':'—'}${a.base!=null?` <span style="opacity:.7">(normal ${a.base}%)</span>`:''}${fitaTxt(a.fita)}</span>`).join('');
  return `<div class="card" style="margin:0 0 12px 0"><div class="note" style="font-size:11px;margin-bottom:4px">🛰️ Radar — mínimas e subidas em todas as ligas/mercados</div>${chips}</div>`;
}
async function carregaRadar(){
  try{const r=await fetch('/api/radar',{cache:'no-store'});const l=await r.json();
    const el=document.getElementById('radar');if(el)el.innerHTML=radarHtml(l);}catch(e){}
}
function notificaRadar(a){
  const nomeL=nomeLiga[a.liga]||a.liga, nomeM=nomeMkt[a.mkt]||a.mkt;
  const titulo=a.tipo==='minima'?`📉 MÍNIMA — ${nomeL} · ${nomeM}${a.pagando!=null?` — pagando ${a.pagando}%`:''}`:`📈 SUBINDO — ${nomeL} · ${nomeM}${a.deOnde!=null&&a.pagando!=null?` — ${a.deOnde}% → ${a.pagando}%`:''}`;
  const corpo=(a.tipo==='minima'?'Mercado segurando — pagando abaixo do normal.':'Pagamento voltando agora.')+fitaTxt(a.fita);
  try{if('Notification' in window&&Notification.permission==='granted')new Notification(titulo,{body:corpo,tag:a.liga+'|'+a.mkt+'|'+a.tipo});}catch(e){}
  bipSeq(a.tipo==='minima'?[[523,0,0.16],[392,0.2,0.24]]:[[660,0,0.15],[990,0.18,0.2]]);
}
document.getElementById('notifBtn').addEventListener('click',()=>{
  if(!('Notification' in window)){alert('Este navegador não suporta notificações.');return;}
  Notification.requestPermission().then(p=>{
    const b=document.getElementById('notifBtn');
    if(p==='granted'){b.textContent='🖥️ Notificações ativas';b.style.borderColor='var(--greenb)';b.style.color='var(--greenb)';b.style.background='rgba(46,160,67,.2)';
      try{new Notification('🛰️ Radar ativo',{body:'Você será avisado de mínimas e subidas em todas as ligas e mercados.'});}catch(e){}}
    else if(p==='denied'){b.textContent='🖥️ Bloqueadas no navegador';}
  });
});

// ===== RELATORIO POR DATA (so tela; diagnostico do regime diario) =====
async function carregaRelatorio(liga){
  const el=document.getElementById('relSec'); if(!el)return;
  window.__relC=window.__relC||{};
  const c=window.__relC[liga];
  if(c&&Date.now()-c.ts<120000){el.innerHTML=c.html;return;}
  el.innerHTML='<div class="sec">📅 Relatório por data</div><div class="card note">calculando…</div>';
  try{
    const r=await fetch('/api/relatorio/'+liga,{cache:'no-store'});
    const b=await r.json();
    if(b.erro){el.innerHTML='';return;}
    const seta=v=>v==null?'':v>2?` <span style="color:var(--greenb)">📈 +${v}</span>`:v<-2?` <span style="color:var(--red)">📉 ${v}</span>`:' <span class="note">≈</span>';
    const cards=(b.dias||[]).map((d,i)=>{
      const dl=d.delta||{};
      const per=d.periodos||{};
      const perTxt=[['madrugada','madrugada'],['manha','manhã'],['tarde','tarde'],['noite','noite']].map(([k,lbl])=>per[k]?`${lbl} <b>${per[k].o35}%</b> (${per[k].n}j)`:null).filter(Boolean).join(' · ');
      return `<div class="card" style="margin-bottom:8px"><div style="font-weight:700;color:var(--blue)">📆 ${d.data}${i===0?' <span class="note">(em andamento)</span>':''} — ${d.jogos} jogos · média ${d.mediaGols} gols</div>
      <div style="font-size:12px;margin-top:4px">Over 2.5 <b>${d.o25}%</b>${seta(dl.o25)} · Over 3.5 <b>${d.o35}%</b>${seta(dl.o35)} · 5+ <b>${d.ge5}%</b>${seta(dl.ge5)} · Ambas <b>${d.ambas}%</b>${seta(dl.ambas)}</div>
      ${perTxt?`<div class="note" style="font-size:11px;margin-top:4px">Over 3.5 por período: ${perTxt}</div>`:''}</div>`;
    }).join('');
    const html=`<div class="sec">📅 Relatório por data — regime diário do algoritmo <span class="note" style="font-size:11px">(📈/📉 = comparado ao dia anterior)</span></div>${cards}<div class="note" style="font-size:11px;margin-bottom:10px">⚠️ ${b.aviso}</div>`;
    window.__relC[liga]={ts:Date.now(),html};
    el.innerHTML=html;
  }catch(e){el.innerHTML='';}
}

// ===== HISTORICO DE INDICACOES (backtest) — so tela, nao altera analises =====
async function carregaBacktest(liga,mkt){
  const el=document.getElementById('btSec'); if(!el)return;
  const k=liga+'|'+mkt;
  window.__btC=window.__btC||{};
  const c=window.__btC[k];
  if(c&&Date.now()-c.ts<60000){el.innerHTML=c.html;return;}
  el.innerHTML='<div class="sec">📋 Histórico de indicações (backtest)</div><div class="card note">calculando histórico…</div>';
  try{
    const r=await fetch('/api/backtest/'+liga+'?mkt='+mkt+'&n=100',{cache:'no-store'});
    const b=await r.json();
    if(b.erro){el.innerHTML='';return;}
    const ind=b.indicados||{};
    const lst=(b.ultimos10indicados||[]).slice().reverse(); // mais recente primeiro
    const linhas=lst.map(u=>`<div style="display:flex;justify-content:space-between;gap:8px;padding:6px 0;border-bottom:1px solid var(--line);font-size:12px;flex-wrap:wrap"><span>${u.resultado==='GREEN'?'🟢':'🔴'} ${u.horario?`<span style="color:var(--blue)">🕐 ${u.horario}</span> `:''}<b>${u.nome}</b> ${u.placar?`<span class="note">(${u.placar})</span>`:''}</span><span class="note">@${u.odd} · score ${u.score} · EV ${u.ev>0?'+':''}${u.ev}%</span></div>`).join('');
    const html=`<div class="sec">📋 Histórico de indicações (backtest) — ${nomeMkt[mkt]}</div>
      <div class="card" style="margin-bottom:10px">
        <div style="font-size:13px;margin-bottom:8px">Regra <b>score ≥30 + EV positivo</b>, reavaliada jogo a jogo com o histórico daquele momento (últimos ${b.jogosAvaliados} jogos): indicados <b>${ind.n||0}</b> · GREEN <b class="pos">${ind.green||0}</b> (<b>${ind.pct!=null?ind.pct+'%':'—'}</b>) · base da liga ${b.baseGeral}%</div>
        ${linhas||'<div class="note">nenhuma indicação na janela avaliada</div>'}
        <div class="note" style="margin-top:8px;font-size:11px">⚠️ reconstrução retroativa com os mesmos critérios; amostras pequenas oscilam — use como acompanhamento, não como garantia.</div>
      </div>`;
    window.__btC[k]={ts:Date.now(),html};
    el.innerHTML=html;
  }catch(e){el.innerHTML='';}
}

function render(d){
  const a=d.analise, mkt=d.mercado;
  const aquece=a.aquecingo||a.aquecendo;
  const sig=a.sinal||{};
  const term=a.termometro;
  const maxv=Math.max(...term.map(t=>t.v||0),1);
  const termHtml=term.map((t,i)=>{
    const h=t.v==null?4:Math.max(4,Math.round(t.v/maxv*100));
    const col=t.v==null?'var(--panel2)':(i===0&&a.aquecendo?'var(--greenb)':'var(--blue)');
    return `<div class="b" style="height:${h}%;background:${col}"><span>${t.v==null?'—':t.v+'%'}</span><small>${t.n}</small></div>`;
  }).join('');

  // GRAFICO DA LINHA (SVG) com numeros nos pontos + histograma MACD + LTA/LTB
  const serie=a.serie||[];
  const chart=lineChart(serie, a.macdHist||[], a.trend, a.ehTotalGols);

  // AVISO DE ROMPIMENTO (o sinal de ouro: reversao de ciclo)
  let rompHtml='';
  if(a.trend&&a.trend.rompimento){
    const r=a.trend.rompimento;
    const cor=r.cor==='verde'?'var(--greenb)':'var(--red)';
    rompHtml=`<div style="padding:12px 16px;border-radius:10px;background:${r.cor==='verde'?'rgba(46,160,67,.12)':'rgba(218,54,51,.12)'};border:1.5px solid ${cor};margin-bottom:10px;font-size:14px"><b style="color:${cor}">⚡ ${r.msg}</b></div>`;
  }
  // resumo das linhas de tendencia (sempre visivel)
  let tendHtml='';
  if(a.trend){
    const t=a.trend;
    const ltaTxt=t.lta?`<span style="color:var(--greenb)">LTA ${t.lta.inclinacao>0?'↗':'→'} (suporte)</span>`:'<span class="note">LTA: sem fundos ascendentes</span>';
    const ltbTxt=t.ltb?`<span style="color:var(--red)">LTB ${t.ltb.inclinacao<0?'↘':'→'} (resistência)</span>`:'<span class="note">LTB: sem topos descendentes</span>';
    tendHtml=`<div style="font-size:12px;color:var(--muted);margin-top:6px">Tendência: <b style="color:#e8edf4">${t.tendencia}</b> &nbsp;•&nbsp; ${ltaTxt} &nbsp;•&nbsp; ${ltbTxt}</div>`;
  }

  // PAINEL DE ALERTAS (no topo, em destaque)
  const alertaHtml=(a.alertas||[]).map(al=>{
    const cor=al.cls==='ok'?'var(--greenb)':al.cls==='bad'?'var(--red)':'var(--amber)';
    return `<div style="padding:8px 12px;border-radius:8px;background:rgba(255,255,255,.03);border-left:3px solid ${cor};margin-bottom:6px;font-size:13px"><b style="color:${cor}">${al.tipo}</b> — ${al.txt}</div>`;
  }).join('');

  // cor do sinal
  const sinalCor = /COMPRA|SUBINDO/.test(sig.sinal)?'var(--greenb)' : /TOPO|RISCO|RECUO/.test(sig.sinal)?'var(--red)' : /PROTEGER|FUNDO|MINIMA/.test(sig.sinal)?'var(--amber)':'var(--muted)';

  // confluencia 3h/6h/12h
  const conf=a.confluencia||{janelas:[]};
  const confHtml=(conf.janelas||[]).map(j=>{
    const cor=j.dir==='Subindo'?'var(--greenb)':j.dir==='Descendo'?'var(--red)':'var(--muted)';
    return `<div class="card" style="flex:1;min-width:120px;text-align:center"><h3>${j.nome}</h3><div style="font-size:16px;font-weight:700;color:${cor}">${j.dir}</div><div class="note">${j.pct!=null?j.pct+'% • incl '+j.slope:'sem dados'}</div></div>`;
  }).join('');

  // PROXIMOS JOGOS (cards detalhados - cerebro real da extensao)
  const statusCor=s=>/ENTRADA/.test(s)?'var(--greenb)':/OBSERVAR/.test(s)?'#7fd17f':/PASSAR|EVITAR|TOPO/.test(s)?'var(--red)':'var(--amber)';
  const scoreCor=sc=>sc>=70?'var(--greenb)':sc>=55?'var(--amber)':'var(--red)';
  const prox=(d.proximos||[]).map(p=>{
    if(p.erro)return `<div class="card" style="margin-bottom:10px"><b>${p.nome||'?'}</b> <span class="note">— ${p.erro}</span></div>`;
    if(p.semEV)return `<div class="card" style="margin-bottom:10px;border-left:4px solid #58a6ff">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <b style="font-size:15px">${p.horario?`<span style="color:var(--blue);margin-right:8px">🕐 ${p.horario}</span>`:''}${p.nome} <span style="color:var(--muted);font-size:11px;font-weight:400">[${d.liga.toUpperCase()}]</span>${p.ancora?`<span style="margin-left:8px;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:800;background:${p.ancora.nivel==='forte'?'#f0a020':'#1f6feb'};color:#0d1117">⚓ ÂNCORA${p.ancora.nivel==='forte'?' FORTE':''}</span>`:''}</b>
        <span class="note" style="font-size:11px">Total Gols — use o gráfico</span>
      </div>${p.ancora?`<div style="margin-top:8px;font-size:12px;color:${p.ancora.nivel==='forte'?'#f0a020':'#58a6ff'};font-weight:700">⚓ ${p.ancora.casa.hit?`🏠 ${p.ancora.casa.time} ${p.ancora.casa.o35}% O3.5/${p.ancora.casa.p5}% 5+`:''} ${p.ancora.fora.hit?`✈️ ${p.ancora.fora.time} ${p.ancora.fora.o35}% O3.5/${p.ancora.fora.p5}% 5+`:''}</div>`:''}</div>`;
    return `<div class="card" style="margin-bottom:10px;border-left:4px solid ${scoreCor(p.score||0)}">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <b style="font-size:15px">${p.rankJogo?`<span style="margin-right:8px;padding:2px 8px;border-radius:6px;font-size:12px;font-weight:800;background:${p.rankJogo===1?'#f0a020':'#26314a'};color:${p.rankJogo===1?'#0d1117':'#9fb0c3'}">🏆 ${p.rankJogo}º/${p.rankTotal}</span>`:''}${p.horario?`<span style="color:var(--blue);margin-right:8px">🕐 ${p.horario}</span>`:''}${p.nome} <span style="color:var(--muted);font-size:11px;font-weight:400">[${d.liga.toUpperCase()}]</span>${p.ancora?`<span style="margin-left:8px;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:800;background:${p.ancora.nivel==='forte'?'#f0a020':'#1f6feb'};color:#0d1117">⚓ ÂNCORA${p.ancora.nivel==='forte'?' FORTE':''}</span>`:''}</b>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="text-align:center"><div style="font-size:26px;font-weight:800;color:${scoreCor(p.score||0)};line-height:1">${p.score??'—'}</div><div class="note" style="font-size:9px">SCORE</div></div>

function lineChart(serie, macdHist, trend, ehGols){const uni=ehGols?"":"%";
  if(!serie.length)return '<div class="note">sem dados para o gráfico</div>';
  const W=680,H=200,pad=28, hH=70, gap=14; // H=linha, hH=histograma
  const totalH=H+gap+hH;
  const min=Math.min(...serie),max=Math.max(...serie);
  const rng=Math.max(1,max-min);
  const x=i=>pad+i*((W-2*pad)/(serie.length-1||1));
  const y=v=>pad+(1-(v-min)/rng)*(H-2*pad);
  // LINHAS DE TENDENCIA LTA (verde, suporte) e LTB (vermelho, resistencia)
  let trendSvg='';
  if(trend){
    const buildLine=(s,cor,nome)=>{
      if(!s)return '';
      const pontos=s.map((v,i)=>v==null?null:x(i)+','+y(v)).filter(Boolean).join(' ');
      if(!pontos)return '';
      // acha o ultimo ponto pra rotular
      let lastI=s.length-1; while(lastI>=0&&s[lastI]==null)lastI--;
      const lab=lastI>=0?`<text x="${x(lastI)+4}" y="${y(s[lastI])}" fill="${cor}" font-size="10" font-weight="700">${nome}</text>`:'';
      return `<polyline points="${pontos}" fill="none" stroke="${cor}" stroke-width="1.6" stroke-dasharray="5 3" opacity="0.9"/>${lab}`;
    };
    trendSvg += buildLine(trend.lta&&trend.lta.serie,'#3fb950','LTA');
    trendSvg += buildLine(trend.ltb&&trend.ltb.serie,'#da3633','LTB');
  }
  // linha com cor por direcao geral
  const last=serie[serie.length-1], first=serie[0];
  const cor=last>first?'#3fb950':last<first?'#da3633':'#8b98a8';
  const pts=serie.map((v,i)=>x(i)+','+y(v)).join(' ');
  // bolinhas + numeros nos pontos - ADAPTATIVO pra nao poluir com muitos pontos
  let dots='', labels='';
  const N=serie.length;
  const mostraNumeros = N<=24;   // numeros so com poucos jogos
  const mostraBolinhas = N<=60;  // bolinhas so ate 60 jogos
  serie.forEach((v,i)=>{
    if(mostraBolinhas){
      const r = N<=24?3:2;
      dots+=`<circle cx="${x(i)}" cy="${y(v)}" r="${r}" fill="${i===N-1?cor:'#8b98a8'}"/>`;
    }
    if(mostraNumeros && (i===0||v!==serie[i-1])){
      labels+=`<text x="${x(i)}" y="${y(v)-8}" fill="#e6edf3" font-size="11" font-weight="600" text-anchor="middle">${v}</text>`;
    }
  });
  // sempre marca o ultimo ponto (atual) com numero, mesmo com muitos jogos
  if(!mostraNumeros){
    const lv=serie[N-1];
    labels+=`<circle cx="${x(N-1)}" cy="${y(lv)}" r="3.5" fill="${cor}"/>`+
            `<text x="${x(N-1)-6}" y="${y(lv)-8}" fill="${cor}" font-size="12" font-weight="700" text-anchor="end">${lv}${uni}</text>`;
  }
  // linha mais fina quando ha muitos pontos
  const larguraLinha = N<=24?2: N<=80?1.6:1.2;
  // histograma MACD embaixo
  let macdSvg='';
  if(macdHist&&macdHist.length){
    const hm=Math.max(...macdHist.map(Math.abs),0.5);
    const baseY=H+gap+hH/2;
    const hx=i=>pad+i*((W-2*pad)/(macdHist.length-1||1));
    macdSvg=`<line x1="${pad}" y1="${baseY}" x2="${W-pad}" y2="${baseY}" stroke="#2d3543"/>`;
    macdHist.forEach((m,i)=>{
      const bh=Math.abs(m)/hm*(hH/2-2);
      const col=m>=0?'#2ea043':'#da3633';
      macdSvg+=`<rect x="${hx(i)-2}" y="${m>=0?baseY-bh:baseY}" width="4" height="${bh}" fill="${col}"/>`;
    });
    macdSvg+=`<text x="${pad}" y="${H+gap+10}" fill="#8b98a8" font-size="10">Histograma MACD (MM1 vs MM2)</text>`;
  }
  return `<svg viewBox="0 0 ${W} ${totalH}" style="width:100%;height:auto">
    <line x1="${pad}" y1="${pad}" x2="${W-pad}" y2="${pad}" stroke="#2d3543" stroke-dasharray="3 3"/>
    <line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}" stroke="#2d3543" stroke-dasharray="3 3"/>
    <polyline points="${pts}" fill="none" stroke="${cor}" stroke-width="${larguraLinha}"/>
    ${trendSvg}
    ${dots}${labels}
    <text x="${W-pad}" y="${pad-8}" fill="#8b98a8" font-size="11" text-anchor="end">Topo ${max}${uni}</text>
    <text x="${W-pad}" y="${H-pad+16}" fill="#8b98a8" font-size="11" text-anchor="end">Fundo ${min}${uni}</text>
    ${macdSvg}
  </svg>`;
}

function destravaSom(){
  try{
    const Ctx=window.AudioContext||window.webkitAudioContext; if(!Ctx)return;
    window.__actx=window.__actx||new Ctx();
    window.__actx.resume().then(()=>{
      const b=document.getElementById('somBtn');
      if(window.__actx.state==='running'){
        if(b){b.textContent='🔔 Som ativado';b.style.background='rgba(46,160,67,.2)';b.style.borderColor='var(--greenb)';b.style.color='var(--greenb)';}
        bipSeq([[880,0,0.12],[1175,0.14,0.14]]); // bip de confirmacao
      }
    });
  }catch(e){}
}
document.getElementById('somBtn').addEventListener('click',destravaSom);

['click','keydown','touchstart'].forEach(ev=>window.addEventListener(ev,function once(){
  destravaSom(); ['click','keydown','touchstart'].forEach(e=>window.removeEventListener(e,once));
},{once:true}));

// ===== TEMPO REAL (SSE): servidor avisa quando a liga atualiza -> busca na hora =====
// Nao altera nenhuma analise; so elimina a espera do ciclo de 10s.
function ligaSSE(){
  try{
    const es=new EventSource('/api/eventos');
    es.onmessage=ev=>{
      try{
        const m=JSON.parse(ev.data);
        if(m.tipo==='liga'&&m.liga===ligaSel.value){ _lastHash=''; tick(); }
        else if(m.tipo==='radar'){ notificaRadar(m); carregaRadar(); }
      }catch(e){}
    };
    es.onerror=()=>{ /* EventSource reconecta sozinho; o ciclo de 10s cobre o intervalo */ };
  }catch(e){}
}
ligaSSE();
// ao voltar pra aba, atualiza imediatamente (sem esperar ciclo)
document.addEventListener('visibilitychange',()=>{ if(!document.hidden){ _lastHash=''; tick(); } });
